version: '3.8'

services:
  lemonade:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=development
      - GIN_MODE=debug
    volumes:
      - .:/app
    command: go run main.go
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: lemonade_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lemonade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
